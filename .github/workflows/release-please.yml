name: Release Please

on:
  push:
    branches:
      - main

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: node
          package-name: "@twelvehart/cursor-agents"

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Run unit tests
        run: bun test tests/unit

      - name: Build package
        run: bun run build

      - name: Verify publish tarball contents
        run: npm pack --dry-run

      - name: Smoke test packed CLI
        run: |
          PACKAGE_FILE=$(npm pack | tail -n 1)
          TMPDIR=$(mktemp -d)
          npm install --prefix "$TMPDIR" "$PACKAGE_FILE"
          "$TMPDIR/node_modules/.bin/cursor-agents" --help

      - name: Publish package
        run: npm publish --provenance
