name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Run unit tests
        run: bun test tests/unit

      - name: Build package
        run: bun run build

      - name: Verify publish tarball contents
        run: npm pack --dry-run

      - name: Smoke test packed CLI
        run: |
          PACKAGE_FILE=$(npm pack | tail -n 1)
          TMPDIR=$(mktemp -d)
          npm install --prefix "$TMPDIR" "$PACKAGE_FILE"
          "$TMPDIR/node_modules/.bin/cursor-agents" --help
